version: v2
clean: true
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/sergeyslonimsky/elara/internal/proto
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/proto
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: internal/proto
    opt:
      - paths=source_relative
  # TypeScript (protobuf types + service descriptors)
  - remote: buf.build/bufbuild/es:v2.11.0
    out: web/src/gen
    include_imports: true
    opt:
      - target=ts
  # TypeScript (TanStack Query hooks)
  - remote: buf.build/connectrpc/query-es:v2.2.0
    out: web/src/gen
    opt:
      - target=ts
