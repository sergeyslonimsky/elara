version: v2
clean: true
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/sergeyslonimsky/elara/internal/proto
plugins:
  # Go
  - local: protoc-gen-go
    out: internal/proto
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/proto
    opt:
      - paths=source_relative
  # TypeScript (protobuf types + service descriptors)
  - local: web/node_modules/.bin/protoc-gen-es
    out: web/src/gen
    include_imports: true
    opt:
      - target=ts
  # TypeScript (TanStack Query hooks)
  - local: web/node_modules/.bin/protoc-gen-connect-query
    out: web/src/gen
    opt:
      - target=ts
