syntax = "proto3";

package elara.dashboard.v1;

import "elara/config/v1/config.proto";
import "google/protobuf/timestamp.proto";

service DashboardService {
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc ListActivity(ListActivityRequest) returns (ListActivityResponse);
}

message GetStatsRequest {}

message GetStatsResponse {
  int32 namespace_count = 1;
  int32 config_count    = 2;
  int32 active_client_count = 3;
  int64 global_revision = 4;
}

message ActivityEntry {
  int64                    revision   = 1;
  elara.config.v1.EventType event_type = 2;
  string                   path       = 3;
  string                   namespace  = 4;
  int64                    version    = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message ListActivityRequest {
  // Maximum number of entries to return. Defaults to 50 if 0.
  int32 limit = 1;
}

message ListActivityResponse {
  repeated ActivityEntry entries = 1;
}
