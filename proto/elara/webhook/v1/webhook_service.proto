syntax = "proto3";
package elara.webhook.v1;

import "buf/validate/validate.proto";
import "elara/webhook/v1/webhook.proto";

option go_package = "github.com/sergeyslonimsky/elara/internal/proto/elara/webhook/v1;webhookv1";

service WebhookService {
  rpc CreateWebhook(CreateWebhookRequest) returns (CreateWebhookResponse);
  rpc GetWebhook(GetWebhookRequest) returns (GetWebhookResponse);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse);
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse);
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  rpc GetDeliveryHistory(GetDeliveryHistoryRequest) returns (GetDeliveryHistoryResponse);
}

message CreateWebhookRequest {
  string url = 1 [(buf.validate.field).required = true];
  string namespace_filter = 2;
  string path_prefix = 3;
  repeated WebhookEvent events = 4 [(buf.validate.field).repeated.min_items = 1];
  string secret = 5;
  bool enabled = 6;
}
message CreateWebhookResponse {
  Webhook webhook = 1;
}

message GetWebhookRequest {
  string id = 1 [(buf.validate.field).required = true];
}
message GetWebhookResponse {
  Webhook webhook = 1;
}

message UpdateWebhookRequest {
  string id = 1 [(buf.validate.field).required = true];
  string url = 2;
  string namespace_filter = 3;
  string path_prefix = 4;
  repeated WebhookEvent events = 5;
  string secret = 6;
  bool enabled = 7;
}
message UpdateWebhookResponse {
  Webhook webhook = 1;
}

message DeleteWebhookRequest {
  string id = 1 [(buf.validate.field).required = true];
}
message DeleteWebhookResponse {}

message ListWebhooksRequest {}
message ListWebhooksResponse {
  repeated Webhook webhooks = 1;
}

message GetDeliveryHistoryRequest {
  string webhook_id = 1 [(buf.validate.field).required = true];
}
message GetDeliveryHistoryResponse {
  repeated DeliveryAttempt attempts = 1;
}
