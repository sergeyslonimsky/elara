syntax = "proto3";

package elara.common.v1;

message PaginationRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message PaginationResponse {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
}

enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASC = 1;
  SORT_DIRECTION_DESC = 2;
}

message SortRequest {
  string field = 1;
  SortDirection direction = 2;
}
