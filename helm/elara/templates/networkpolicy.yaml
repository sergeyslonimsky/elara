{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "elara.fullname" . }}
  labels:
    {{- include "elara.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "elara.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - port: {{ .Values.config.http.port }}
          protocol: TCP
        - port: {{ .Values.config.grpc.port }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
