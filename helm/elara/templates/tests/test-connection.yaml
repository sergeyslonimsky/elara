apiVersion: v1
kind: Pod
metadata:
  name: {{ include "elara.fullname" . }}-test-connection
  labels:
    {{- include "elara.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
      command: ["sh", "-c"]
      args:
        - |
          set -euo pipefail
          HOST={{ include "elara.fullname" . }}:{{ .Values.service.ports.http }}
          echo "Checking /livez on http://$HOST"
          curl --fail --silent --show-error --max-time 10 "http://$HOST/livez"
          echo
          echo "Checking /readyz on http://$HOST"
          curl --fail --silent --show-error --max-time 10 "http://$HOST/readyz"
          echo
          echo "OK"
