name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write   # chart-releaser pushes to gh-pages + creates GH releases
  packages: write   # ghcr.io image push
  id-token: write   # cosign keyless signing (optional, future)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -----------------------------------------------------------------
  # Container image → ghcr.io/<owner>/<repo>:<version>
  # -----------------------------------------------------------------
  image:
    name: Publish container image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Elara
            org.opencontainers.image.description=Configuration management service with Web UI, ConnectRPC API, and etcd-compatible gRPC API.
            org.opencontainers.image.licenses=MIT

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------
  # Helm chart → gh-pages (served via GitHub Pages as a Helm repo)
  # -----------------------------------------------------------------
  chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Align chart version with git tag
        env:
          VERSION: ${{ needs.image.outputs.version }}
        run: |
          sed -i -E "s/^version:.*/version: ${VERSION}/" helm/elara/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/elara/Chart.yaml
          grep -E '^(version|appVersion):' helm/elara/Chart.yaml

      - name: Release chart to gh-pages
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
