name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write   # chart-releaser pushes to gh-pages + creates GH releases
  packages: write   # ghcr.io image push
  id-token: write   # cosign keyless signing (optional, future)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -----------------------------------------------------------------
  # Container image → ghcr.io/<owner>/<repo>:<version>
  # -----------------------------------------------------------------
  image:
    name: Publish container image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Elara
            org.opencontainers.image.description=Configuration management service with Web UI, ConnectRPC API, and etcd-compatible gRPC API.
            org.opencontainers.image.licenses=MIT

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # -----------------------------------------------------------------
  # Helm chart → gh-pages (served via GitHub Pages as a Helm repo)
  # -----------------------------------------------------------------
  chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Align chart version with git tag
        env:
          VERSION: ${{ needs.image.outputs.version }}
        run: |
          sed -i -E "s/^version:.*/version: ${VERSION}/" helm/elara/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/elara/Chart.yaml
          grep -E '^(version|appVersion):' helm/elara/Chart.yaml

      - name: Prepare GPG signing key
        env:
          HELM_GPG_KEY: ${{ secrets.HELM_GPG_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$HELM_GPG_KEY" | base64 -d | gpg --dearmor > "$HOME/secring.gpg"
          gpg --no-default-keyring --keyring "$HOME/secring.gpg" --list-secret-keys
          printf '\n' > "$HOME/passphrase.txt"
          echo "CR_KEYRING=$HOME/secring.gpg" >> "$GITHUB_ENV"
          echo "CR_KEY=Sergey Slonimsky" >> "$GITHUB_ENV"
          echo "CR_PASSPHRASE_FILE=$HOME/passphrase.txt" >> "$GITHUB_ENV"

      - name: Release chart to gh-pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
          skip_existing: true
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for Helm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$GH_TOKEN" | helm registry login ghcr.io \
            --username "$GH_ACTOR" \
            --password-stdin

      - name: Push chart to OCI registry
        id: push
        env:
          VERSION: ${{ needs.image.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          TGZ=".cr-release-packages/elara-${VERSION}.tgz"
          if [ ! -f "$TGZ" ]; then
            echo "::notice::Chart package not found (likely already released); skipping OCI push"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OCI_REPO="oci://ghcr.io/${OWNER,,}/charts"
          PUSH_OUTPUT=$(helm push "$TGZ" "$OCI_REPO" 2>&1)
          echo "$PUSH_OUTPUT"
          DIGEST=$(echo "$PUSH_OUTPUT" | awk '/Digest:/ {print $2}')
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to capture chart digest from helm push output"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${OWNER,,}/charts/elara@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for cosign
        if: steps.push.outputs.skip != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.push.outputs.skip != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign Helm chart
        if: steps.push.outputs.skip != 'true'
        run: |
          cosign sign --yes ${{ steps.push.outputs.ref }}
