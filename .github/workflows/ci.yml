name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-progress runs for the same branch/PR — save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: web/dist

  go:
    name: Go test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # web/embed.go uses //go:embed all:dist, so go vet/go build/go test
      # require a populated web/dist directory.
      # Since frontend build is parallel, we create an empty file in dist
      # to satisfy the embed requirement without waiting for the full build.
      - name: Create dummy dist for go:embed
        run: |
          mkdir -p web/dist
          touch web/dist/.gitkeep

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Test (race)
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  proto:
    name: Proto lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=master'
        if: github.event_name == 'pull_request'
        continue-on-error: true

  helm:
    name: Helm lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Helm lint
        run: helm lint helm/elara/

      - name: Helm template (defaults)
        run: helm template elara helm/elara/ > /tmp/default.yaml

      - name: Helm template (all features)
        run: |
          helm template elara helm/elara/ \
            --set ingress.enabled=true \
            --set metrics.enabled=true \
            --set metrics.serviceMonitor.enabled=true \
            --set networkPolicy.enabled=true \
            --set tracing.enabled=true \
            --set tracing.otlpEndpoint=http://otel:4318 \
            > /tmp/full.yaml

      - name: Schema rejects invalid values
        run: |
          if helm template elara helm/elara/ --set replicaCount=2 > /dev/null 2>&1; then
            echo "schema must reject replicaCount=2"; exit 1
          fi
          if helm template elara helm/elara/ --set storage.type=postgres > /dev/null 2>&1; then
            echo "schema must reject storage.type=postgres"; exit 1
          fi

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'dependabot[bot]'
    needs: [go]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker build
    needs: [frontend, go]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: web/dist

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
