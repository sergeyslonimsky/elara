name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-progress runs for the same branch/PR — save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # web/embed.go uses //go:embed all:dist, so go vet/go build
      # require a populated web/dist directory. dist is gitignored — build
      # it here so the Go steps below see a valid embed tree.
      - name: Build frontend (for go:embed)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Test (race)
        run: go test -race -count=1 ./...

  proto:
    name: Proto lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=master'
        if: github.event_name == 'pull_request'
        continue-on-error: true

  helm:
    name: Helm lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Helm lint
        run: helm lint helm/elara/

      - name: Helm template (defaults)
        run: helm template elara helm/elara/ > /tmp/default.yaml

      - name: Helm template (all features)
        run: |
          helm template elara helm/elara/ \
            --set ingress.enabled=true \
            --set metrics.enabled=true \
            --set metrics.serviceMonitor.enabled=true \
            --set networkPolicy.enabled=true \
            --set tracing.enabled=true \
            --set tracing.otlpEndpoint=http://otel:4318 \
            > /tmp/full.yaml

      - name: Schema rejects invalid values
        run: |
          if helm template elara helm/elara/ --set replicaCount=2 > /dev/null 2>&1; then
            echo "schema must reject replicaCount=2"; exit 1
          fi
          if helm template elara helm/elara/ --set storage.type=postgres > /dev/null 2>&1; then
            echo "schema must reject storage.type=postgres"; exit 1
          fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
